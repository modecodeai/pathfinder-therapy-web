name: Deploy production site

on:
  push:
    branches:
      - main
      - cursor/lead-funnel-ads-54ef
  workflow_dispatch:
    inputs:
      preview_origin:
        description: Cloudflare preview deployment origin
        required: false
        default: https://9aa49f15.pathfinder-therapy-web.pages.dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean build output and caches
        run: rm -rf out node_modules/.cache .next tsconfig.tsbuildinfo

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build production mirror with lead funnel
        env:
          PATHFINDER_PREVIEW_ORIGIN: ${{ github.event.inputs.preview_origin || 'https://9aa49f15.pathfinder-therapy-web.pages.dev' }}
          PATHFINDER_BUILD_SHA: ${{ github.sha }}
          GITHUB_SHA: ${{ github.sha }}
          PATHFINDER_CALENDLY_URL: ${{ secrets.PATHFINDER_CALENDLY_URL || vars.PATHFINDER_CALENDLY_URL }}
          PATHFINDER_GA_ID: ${{ secrets.PATHFINDER_GA_ID || vars.PATHFINDER_GA_ID }}
          PATHFINDER_GOOGLE_ADS_ID: ${{ secrets.PATHFINDER_GOOGLE_ADS_ID || vars.PATHFINDER_GOOGLE_ADS_ID }}
          PATHFINDER_GOOGLE_ADS_LEAD_LABEL: ${{ secrets.PATHFINDER_GOOGLE_ADS_LEAD_LABEL || vars.PATHFINDER_GOOGLE_ADS_LEAD_LABEL }}
          PATHFINDER_GOOGLE_ADS_BOOKING_LABEL: ${{ secrets.PATHFINDER_GOOGLE_ADS_BOOKING_LABEL || vars.PATHFINDER_GOOGLE_ADS_BOOKING_LABEL }}
        run: |
          if [ -z "$PATHFINDER_CALENDLY_URL" ]; then
            echo "PATHFINDER_CALENDLY_URL is empty — /book/ will use the fallback placeholder."
          else
            echo "PATHFINDER_CALENDLY_URL is set (calendly.com/$(echo "$PATHFINDER_CALENDLY_URL" | sed 's|.*calendly.com/||'))"
          fi
          if [ -z "$PATHFINDER_GOOGLE_ADS_LEAD_LABEL" ]; then
            echo "::warning::PATHFINDER_GOOGLE_ADS_LEAD_LABEL is empty — /thank-you/ form conversions will not fire in Google Ads."
          fi
          if [ -z "$PATHFINDER_GOOGLE_ADS_BOOKING_LABEL" ]; then
            echo "::warning::PATHFINDER_GOOGLE_ADS_BOOKING_LABEL is empty — /book-confirmed/ Calendly conversions will not fire in Google Ads."
          fi
          echo "Building commit ${GITHUB_SHA}"
          pnpm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=pathfinder-therapy-web --branch=main --commit-hash=${{ github.sha }}

      - name: Promote deployment and purge production cache
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          PATHFINDER_BUILD_SHA: ${{ github.sha }}
        run: |
          echo "Deployed preview URL: ${DEPLOYMENT_URL}"
          node scripts/promote-and-purge-cloudflare.mjs

      - name: Verify production HTML markers
        env:
          PATHFINDER_BUILD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          routes="/ /start/ /book/ /fees/ /about/ /approach/ /therapy/ /contact/"
          for attempt in 1 2 3 4 5 6; do
            echo "Verification attempt ${attempt}..."
            failed=0
            for route in $routes; do
              url="https://www.pathfindertherapy.com${route}"
              html=$(curl -fsSL -H "Cache-Control: no-cache" -H "Pragma: no-cache" "$url")
              echo "$html" | rg -q "x-pathfinder-build-sha\" content=\"${PATHFINDER_BUILD_SHA}\"" || {
                echo "Missing build SHA marker on ${url}"
                failed=1
              }
            done
            if [ "$failed" -eq 0 ]; then
              curl -fsSL -H "Cache-Control: no-cache" "https://www.pathfindertherapy.com/start/" | rg -q "lpStartPathways"
              curl -fsSL -H "Cache-Control: no-cache" "https://www.pathfindertherapy.com/fees/" | rg -q "€95"
              curl -fsSL -H "Cache-Control: no-cache" "https://www.pathfindertherapy.com/fees/" | rg -q "€120"
              curl -fsSL -H "Cache-Control: no-cache" "https://www.pathfindertherapy.com/about/" | rg -q "Every path is different\\. But"
              curl -fsSL -H "Cache-Control: no-cache" "https://www.pathfindertherapy.com/approach/" | rg -q "for a reason\\."
              echo "Production HTML verification passed for commit ${PATHFINDER_BUILD_SHA}"
              exit 0
            fi
            sleep 15
          done
          echo "Production HTML verification failed after retries"
          exit 1
