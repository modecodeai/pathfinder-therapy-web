name: Deploy production site

on:
  push:
    branches:
      - main
      - cursor/lead-funnel-ads-54ef
  workflow_dispatch:
    inputs:
      preview_origin:
        description: Cloudflare preview deployment origin
        required: false
        default: https://9aa49f15.pathfinder-therapy-web.pages.dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build production mirror with lead funnel
        env:
          PATHFINDER_PREVIEW_ORIGIN: ${{ github.event.inputs.preview_origin || 'https://9aa49f15.pathfinder-therapy-web.pages.dev' }}
        run: pnpm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=pathfinder-therapy-web --branch=main
