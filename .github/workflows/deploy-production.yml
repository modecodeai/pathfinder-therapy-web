name: Deploy production site

on:
  push:
    branches:
      - main
      - cursor/lead-funnel-ads-54ef
  workflow_dispatch:
    inputs:
      preview_origin:
        description: Cloudflare preview deployment origin
        required: false
        default: https://9aa49f15.pathfinder-therapy-web.pages.dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build production mirror with lead funnel
        env:
          PATHFINDER_PREVIEW_ORIGIN: ${{ github.event.inputs.preview_origin || 'https://9aa49f15.pathfinder-therapy-web.pages.dev' }}
        run: pnpm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=pathfinder-therapy-web --branch=main

      - name: Promote deployment to production domains
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DEPLOYMENTS=$(curl -s \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/pathfinder-therapy-web/deployments?per_page=10")
          DEPLOYMENT_ID=$(node -e "
            const payload = JSON.parse(process.argv[1]);
            const match = (payload.result || []).find((item) =>
              item.latest_stage?.status === 'success' &&
              (item.environment === 'production' || item.deployment_trigger?.type === 'ad_hoc')
            ) || (payload.result || [])[0];
            if (!match) process.exit(1);
            process.stdout.write(match.id);
          " "${DEPLOYMENTS}")
          echo "Promoting deployment ${DEPLOYMENT_ID} to production..."
          curl -s -X POST \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/pathfinder-therapy-web/deployments/${DEPLOYMENT_ID}/rollback" \
            | node -e "const p=JSON.parse(require('fs').readFileSync(0,'utf8')); if(!p.success){const msg=p.errors?.[0]?.message||''; if(msg.includes('currently in production')){console.log('Already serving this deployment on production domains.'); process.exit(0)} console.error(JSON.stringify(p,null,2)); process.exit(1)}; console.log('Production updated:', p.result?.url || p.result?.id);"
